  <!-- Header -->
  <text x="132" y="72" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">MY SPLITS</text>

  <!-- Subtext -->
  <text x="132" y="88" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#888888" text-anchor="middle">Arnold Push/Pull · Week 3</text>

  <!-- Divider -->
  <line x1="10" y1="98" x2="254" y2="98" stroke="#262626" stroke-width="1" />

  <!-- Current split label -->
  <text x="32" y="120" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#888888" letter-spacing="1">CURRENT PLAN</text>

  <!-- Split Card 1: UPPER PUSH A (ACTIVE) -->
  <rect x="20" y="130" width="224" height="86" rx="14" fill="#1E3A3A" stroke="#4DFFED" stroke-width="1.5" />
  <!-- Left accent bar -->
  <rect x="20" y="130" width="4" height="86" rx="2" fill="#4DFFED" />
  <!-- Day badge -->
  <rect x="32" y="142" width="56" height="20" rx="10" fill="#1A3A3A" />
  <text x="60" y="156" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#4DFFED" text-anchor="middle" font-weight="600">Monday</text>
  <!-- Active badge -->
  <rect x="178" y="142" width="54" height="20" rx="10" fill="#4DFFED" />
  <text x="205" y="156" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#080808" text-anchor="middle" font-weight="700">ACTIVE</text>
  <!-- Split name -->
  <text x="32" y="182" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="800" fill="#FFFFFF" letter-spacing="0.5">UPPER PUSH A</text>
  <text x="32" y="200" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#888888">6 exercises · Chest, Shoulders, Triceps</text>

  <!-- Split Card 2: LOWER A -->
  <rect x="20" y="228" width="224" height="80" rx="14" fill="#161616" stroke="#262626" stroke-width="1" />
  <rect x="20" y="228" width="4" height="80" rx="2" fill="#333333" />
  <rect x="32" y="240" width="64" height="20" rx="10" fill="#1A1A1A" stroke="#262626" stroke-width="1" />
  <text x="64" y="254" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#888888" text-anchor="middle" font-weight="600">Wednesday</text>
  <rect x="188" y="240" width="44" height="20" rx="10" fill="#1A1A1A" stroke="#333333" stroke-width="1" />
  <text x="210" y="254" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="600">Rest</text>
  <text x="32" y="278" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="800" fill="#AAAAAA" letter-spacing="0.5">LOWER A</text>
  <text x="32" y="296" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#555555">5 exercises · Quads, Hamstrings, Glutes</text>

  <!-- Split Card 3: UPPER PULL A -->
  <rect x="20" y="320" width="224" height="80" rx="14" fill="#161616" stroke="#262626" stroke-width="1" />
  <rect x="20" y="320" width="4" height="80" rx="2" fill="#333333" />
  <rect x="32" y="332" width="44" height="20" rx="10" fill="#1A1A1A" stroke="#262626" stroke-width="1" />
  <text x="54" y="346" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#888888" text-anchor="middle" font-weight="600">Friday</text>
  <rect x="188" y="332" width="44" height="20" rx="10" fill="#1A1A1A" stroke="#333333" stroke-width="1" />
  <text x="210" y="346" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#555555" text-anchor="middle" font-weight="600">Next</text>
  <text x="32" y="370" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15" font-weight="800" fill="#AAAAAA" letter-spacing="0.5">UPPER PULL A</text>
  <text x="32" y="388" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#555555">7 exercises · Back, Biceps, Rear Delts</text>

  <!-- Week overview mini strip -->
  <text x="32" y="420" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#888888" letter-spacing="1">WEEK OVERVIEW</text>

  <!-- Day pills -->
  <rect x="20" y="428" width="28" height="28" rx="8" fill="#1E3A3A" />
  <text x="34" y="446" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#4DFFED" text-anchor="middle" font-weight="700">Mo</text>
  <rect x="54" y="428" width="28" height="28" rx="8" fill="#1A1A1A" />
  <text x="68" y="446" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">Tu</text>
  <rect x="88" y="428" width="28" height="28" rx="8" fill="#1A1A1A" />
  <text x="102" y="446" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">We</text>
  <rect x="122" y="428" width="28" height="28" rx="8" fill="#1A1A1A" />
  <text x="136" y="446" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">Th</text>
  <rect x="156" y="428" width="28" height="28" rx="8" fill="#1A3A1A" />
  <text x="170" y="446" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#34D399" text-anchor="middle">Fr</text>
  <rect x="190" y="428" width="28" height="28" rx="8" fill="#1A1A1A" />
  <text x="204" y="446" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">Sa</text>
  <rect x="224" y="428" width="28" height="28" rx="8" fill="#1A1A1A" />
  <text x="238" y="446" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">Su</text>

  <!-- New Split ghost button -->
  <rect x="20" y="466" width="224" height="40" rx="12" fill="transparent" stroke="#4DFFED" stroke-width="1.5" />
  <text x="132" y="490" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" font-weight="700" fill="#4DFFED" text-anchor="middle">+ New Split</text>

  <!-- Bottom nav -->
  <rect x="10" y="508" width="244" height="26" rx="0" fill="#111111" />
  <line x1="10" y1="508" x2="254" y2="508" stroke="#262626" stroke-width="1" />
  <text x="49" y="526" font-family="-apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">⌂</text>
  <rect x="83" y="510" width="28" height="22" rx="6" fill="#1E3A3A" />
  <text x="97" y="526" font-family="-apple-system, sans-serif" font-size="13" fill="#4DFFED" text-anchor="middle">▦</text>
  <text x="167" y="526" font-family="-apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">◈</text>
  <text x="225" y="526" font-family="-apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">◉</text>

  <!-- Home indicator bar -->
  <rect x="102" y="537" width="60" height="4" rx="2" fill="#333333" />
