  <circle cx="108" cy="148" r="18" fill="#1A2A3A" />
  <text x="108" y="153" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="13" fill="#3B82F6" text-anchor="middle" font-weight="700">M</text>
