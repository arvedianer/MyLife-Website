  <text x="232" y="487" font-family="-apple-system, sans-serif" font-size="11" fill="#080808" text-anchor="middle" font-weight="700">↑</text>

  <!-- Bottom nav -->
  <rect x="10" y="502" width="244" height="32" rx="0" fill="#111111" />
  <line x1="10" y1="502" x2="254" y2="502" stroke="#262626" stroke-width="1" />
  <text x="49" y="523" font-family="-apple-system, sans-serif" font-size="14" fill="#555555" text-anchor="middle">⌂</text>
  <text x="97" y="523" font-family="-apple-system, sans-serif" font-size="14" fill="#555555" text-anchor="middle">▦</text>
  <text x="167" y="523" font-family="-apple-system, sans-serif" font-size="14" fill="#555555" text-anchor="middle">◈</text>
  <rect x="211" y="502" width="28" height="28" rx="6" fill="#1E3A3A" />
  <text x="225" y="521" font-family="-apple-system, sans-serif" font-size="14" fill="#4DFFED" text-anchor="middle">◉</text>

  <!-- Home indicator bar -->
  <rect x="102" y="537" width="60" height="4" rx="2" fill="#333333" />
