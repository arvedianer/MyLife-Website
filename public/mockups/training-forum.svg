  <text x="54" y="374" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">💪 12</text>

  <!-- Post Card 3 (partial) -->
  <rect x="20" y="396" width="224" height="56" rx="12" fill="#161616" stroke="#262626" stroke-width="1" />
  <circle cx="40" cy="414" r="12" fill="#1A1A3A" />
  <text x="40" y="419" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#3B82F6" text-anchor="middle" font-weight="700">M</text>
  <text x="60" y="410" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="700" fill="#FFFFFF">Max</text>
  <text x="222" y="410" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#555555" text-anchor="end">1h ago</text>
  <text x="32" y="430" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF">Anyone tried the new Arnold split?</text>
  <text x="32" y="444" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#888888">4 replies · 18 views</text>

