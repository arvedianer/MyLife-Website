  <rect x="20" y="314" width="224" height="72" rx="12" fill="#161616" stroke="#262626" stroke-width="1" />
  <circle cx="40" cy="332" r="12" fill="#1A3A1A" />
  <text x="40" y="337" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#34D399" text-anchor="middle" font-weight="700">S</text>
