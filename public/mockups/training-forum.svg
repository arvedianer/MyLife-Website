  <text x="54" y="292" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">🔥 24</text>
  <rect x="82" y="278" width="44" height="20" rx="10" fill="#1A1A1A" stroke="#262626" stroke-width="1" />
  <text x="104" y="292" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">💬 8</text>

