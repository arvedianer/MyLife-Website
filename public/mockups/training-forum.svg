  <rect x="10" y="460" width="244" height="42" fill="#111111" />
  <line x1="10" y1="460" x2="254" y2="460" stroke="#262626" stroke-width="1" />
  <rect x="20" y="468" width="188" height="28" rx="14" fill="#1A1A1A" stroke="#262626" stroke-width="1" />
  <text x="36" y="486" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#444444">Write something...</text>
