<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 544" width="264" height="544">
  <!-- Phone outer frame -->
  <rect x="0" y="0" width="264" height="544" rx="44" ry="44" fill="#1A1A1A" />
  <!-- Phone inner bezel -->
  <rect x="6" y="6" width="252" height="532" rx="40" ry="40" fill="#0D0D0D" />
  <!-- Screen area -->
  <rect x="10" y="10" width="244" height="524" rx="36" ry="36" fill="#0D0D0D" />

  <!-- Dynamic Island -->
  <rect x="97" y="20" width="70" height="22" rx="11" ry="11" fill="#1A1A1A" />

  <!-- Status bar -->
  <text x="28" y="35" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">9:41</text>

  <!-- Header with avatar -->
  <rect x="10" y="50" width="244" height="60" fill="#0D0D0D" />
  <text x="32" y="78" font-family="-apple-system, sans-serif" font-size="16" fill="#4DFFED">‹</text>
  <!-- Coach avatar circle -->
  <circle cx="132" cy="74" r="18" fill="#1E3A3A" stroke="#4DFFED" stroke-width="1.5" />
  <text x="132" y="79" font-family="-apple-system, sans-serif" font-size="14" fill="#4DFFED" text-anchor="middle" font-weight="700">A</text>
  <!-- Online indicator -->
  <circle cx="146" cy="86" r="5" fill="#34D399" stroke="#0D0D0D" stroke-width="2" />
  <text x="132" y="100" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF" text-anchor="middle" font-weight="700">Coach Arved</text>

  <!-- Divider -->
  <line x1="10" y1="112" x2="254" y2="112" stroke="#262626" stroke-width="1" />

  <!-- Chat area background -->
  <rect x="10" y="112" width="244" height="342" fill="#080808" />

  <!-- Date stamp -->
  <text x="132" y="132" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#444444" text-anchor="middle">Today</text>

  <!-- Coach message 1 (left) -->
  <rect x="20" y="140" width="164" height="48" rx="14" rx-top-left="4" fill="#1A1A1A" />
  <text x="32" y="158" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF">Hey. Checked your last</text>
  <text x="32" y="172" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF">session. Solid numbers.</text>
  <text x="32" y="184" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555">10:32</text>

  <!-- User message (right, cyan) -->
  <rect x="80" y="200" width="164" height="36" rx="14" fill="#1E4A4A" />
  <text x="100" y="214" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF">How's my progress?</text>
  <text x="228" y="232" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#4DFFED" text-anchor="end">10:33 ✓✓</text>

  <!-- Coach message 2 (left) -->
  <rect x="20" y="248" width="196" height="60" rx="14" fill="#1A1A1A" />
  <text x="32" y="266" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF">Solid week. Bench up 5kg.</text>
  <text x="32" y="280" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF">Keep the current split for</text>
  <text x="32" y="294" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF">2 more weeks.</text>
  <text x="32" y="304" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555">10:33</text>

  <!-- Bench PR chip inside coach message -->
  <rect x="32" y="282" width="80" height="0" rx="0" fill="transparent" />

  <!-- Coach message 3 (left) — shorter -->
  <rect x="20" y="322" width="180" height="36" rx="14" fill="#1A1A1A" />
  <text x="32" y="337" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF">Sleep 8h before leg day.</text>
  <text x="32" y="350" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FBBF24">Recovery matters most.</text>
  <text x="32" y="355" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555">10:34</text>

  <!-- User typing indicator -->
  <rect x="20" y="372" width="52" height="26" rx="13" fill="#1A1A1A" />
  <circle cx="34" cy="385" r="3" fill="#888888" />
  <circle cx="44" cy="385" r="3" fill="#888888" />
  <circle cx="54" cy="385" r="3" fill="#888888" />

  <!-- Suggested replies -->
  <text x="32" y="416" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555">Suggested:</text>
  <rect x="20" y="422" width="72" height="22" rx="11" fill="#1A1A1A" stroke="#262626" stroke-width="1" />
  <text x="56" y="437" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#4DFFED" text-anchor="middle">Got it 👍</text>
  <rect x="98" y="422" width="88" height="22" rx="11" fill="#1A1A1A" stroke="#262626" stroke-width="1" />
  <text x="142" y="437" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#4DFFED" text-anchor="middle">Show my PRs</text>

  <!-- Input bar -->
  <rect x="10" y="454" width="244" height="40" fill="#111111" />
  <line x1="10" y1="454" x2="254" y2="454" stroke="#262626" stroke-width="1" />
  <rect x="20" y="462" width="188" height="28" rx="14" fill="#1A1A1A" stroke="#262626" stroke-width="1" />
  <text x="36" y="480" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#444444">Message Coach Arved...</text>
  <!-- Send button -->
  <circle cx="232" cy="476" r="14" fill="#4DFFED" />
  <text x="232" y="481" font-family="-apple-system, sans-serif" font-size="12" fill="#080808" text-anchor="middle" font-weight="700">↑</text>

  <!-- Bottom nav -->
  <rect x="10" y="494" width="244" height="40" rx="0" fill="#111111" />
  <line x1="10" y1="494" x2="254" y2="494" stroke="#262626" stroke-width="1" />

  <!-- Home indicator bar -->
  <rect x="102" y="537" width="60" height="4" rx="2" fill="#333333" />
</svg>
