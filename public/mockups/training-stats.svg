<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 264 544" width="264" height="544">
  <!-- Phone outer frame -->
  <rect x="0" y="0" width="264" height="544" rx="44" ry="44" fill="#1A1A1A" />
  <!-- Phone inner bezel -->
  <rect x="6" y="6" width="252" height="532" rx="40" ry="40" fill="#0D0D0D" />
  <!-- Screen area -->
  <rect x="10" y="10" width="244" height="524" rx="36" ry="36" fill="#0D0D0D" />

  <!-- Dynamic Island -->
  <rect x="97" y="20" width="70" height="22" rx="11" ry="11" fill="#1A1A1A" />

  <!-- Status bar -->
  <text x="28" y="35" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF">9:41</text>

  <!-- Header -->
  <text x="132" y="72" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="14" font-weight="800" fill="#FFFFFF" text-anchor="middle" letter-spacing="1">ATHLETE SCORE</text>
  <text x="132" y="88" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#888888" text-anchor="middle">Season 1 · 2026</text>

  <!-- Divider -->
  <line x1="20" y1="98" x2="244" y2="98" stroke="#262626" stroke-width="1" />

  <!-- Score circle background glow -->
  <circle cx="132" cy="168" r="68" fill="#0D1F1F" opacity="0.8" />
  <circle cx="132" cy="168" r="60" fill="none" stroke="#1E3A3A" stroke-width="8" />
  <!-- Score arc (about 74% filled) -->
  <circle cx="132" cy="168" r="60" fill="none" stroke="#4DFFED" stroke-width="8"
    stroke-dasharray="282 94"
    stroke-dashoffset="94"
    stroke-linecap="round"
    transform="rotate(-90 132 168)" />

  <!-- Large score number -->
  <text x="132" y="158" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="44" font-weight="900" fill="#4DFFED" text-anchor="middle">742</text>
  <text x="132" y="178" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="11" fill="#888888" text-anchor="middle">out of 1000</text>

  <!-- Rank badge -->
  <rect x="100" y="186" width="64" height="20" rx="10" fill="#1E3A3A" />
  <text x="132" y="200" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="9" fill="#4DFFED" text-anchor="middle" font-weight="600">ELITE ▲ +12</text>

  <!-- Stats bars section label -->
  <text x="32" y="232" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#888888" letter-spacing="1">BREAKDOWN</text>

  <!-- Stat bars -->
  <!-- STRENGTH -->
  <text x="32" y="254" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF" font-weight="600">STRENGTH</text>
  <text x="232" y="254" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#4DFFED" text-anchor="end" font-weight="700">86</text>
  <rect x="32" y="258" width="200" height="7" rx="3.5" fill="#262626" />
  <rect x="32" y="258" width="172" height="7" rx="3.5" fill="#4DFFED" />

  <!-- VOLUME -->
  <text x="32" y="280" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF" font-weight="600">VOLUME</text>
  <text x="232" y="280" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#4DFFED" text-anchor="end" font-weight="700">74</text>
  <rect x="32" y="284" width="200" height="7" rx="3.5" fill="#262626" />
  <rect x="32" y="284" width="148" height="7" rx="3.5" fill="#4DFFED" />

  <!-- CONSISTENCY -->
  <text x="32" y="306" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF" font-weight="600">CONSISTENCY</text>
  <text x="232" y="306" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#34D399" text-anchor="end" font-weight="700">91</text>
  <rect x="32" y="310" width="200" height="7" rx="3.5" fill="#262626" />
  <rect x="32" y="310" width="182" height="7" rx="3.5" fill="#34D399" />

  <!-- ENDURANCE -->
  <text x="32" y="332" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF" font-weight="600">ENDURANCE</text>
  <text x="232" y="332" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FBBF24" text-anchor="end" font-weight="700">68</text>
  <rect x="32" y="336" width="200" height="7" rx="3.5" fill="#262626" />
  <rect x="32" y="336" width="136" height="7" rx="3.5" fill="#FBBF24" />

  <!-- RECOVERY -->
  <text x="32" y="358" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#FFFFFF" font-weight="600">RECOVERY</text>
  <text x="232" y="358" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#4DFFED" text-anchor="end" font-weight="700">79</text>
  <rect x="32" y="362" width="200" height="7" rx="3.5" fill="#262626" />
  <rect x="32" y="362" width="158" height="7" rx="3.5" fill="#4DFFED" />

  <!-- Weekly mini chart area -->
  <text x="32" y="396" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="10" fill="#888888" letter-spacing="1">SCORE HISTORY</text>

  <!-- Mini chart bars -->
  <rect x="32" y="415" width="18" height="30" rx="4" fill="#262626" />
  <rect x="56" y="408" width="18" height="37" rx="4" fill="#262626" />
  <rect x="80" y="420" width="18" height="25" rx="4" fill="#262626" />
  <rect x="104" y="400" width="18" height="45" rx="4" fill="#3A3A3A" />
  <rect x="128" y="394" width="18" height="51" rx="4" fill="#3A3A3A" />
  <rect x="152" y="388" width="18" height="57" rx="4" fill="#3A5A5A" />
  <rect x="176" y="380" width="18" height="65" rx="4" fill="#4DFFED" opacity="0.8" />
  <rect x="200" y="375" width="18" height="70" rx="4" fill="#4DFFED" />

  <!-- Chart x-axis labels -->
  <text x="41" y="453" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">W1</text>
  <text x="65" y="453" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">W2</text>
  <text x="89" y="453" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">W3</text>
  <text x="113" y="453" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">W4</text>
  <text x="137" y="453" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">W5</text>
  <text x="161" y="453" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">W6</text>
  <text x="185" y="453" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#555555" text-anchor="middle">W7</text>
  <text x="209" y="453" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="8" fill="#4DFFED" text-anchor="middle">Now</text>

  <!-- Bottom nav -->
  <rect x="10" y="492" width="244" height="42" rx="0" fill="#111111" />
  <line x1="10" y1="492" x2="254" y2="492" stroke="#262626" stroke-width="1" />
  <text x="49" y="518" font-family="-apple-system, sans-serif" font-size="14" fill="#555555" text-anchor="middle">⌂</text>
  <text x="97" y="518" font-family="-apple-system, sans-serif" font-size="14" fill="#555555" text-anchor="middle">▦</text>
  <rect x="153" y="500" width="28" height="28" rx="6" fill="#1E3A3A" />
  <text x="167" y="518" font-family="-apple-system, sans-serif" font-size="14" fill="#4DFFED" text-anchor="middle">◈</text>
  <text x="225" y="518" font-family="-apple-system, sans-serif" font-size="14" fill="#555555" text-anchor="middle">◉</text>

  <!-- Home indicator bar -->
  <rect x="102" y="537" width="60" height="4" rx="2" fill="#333333" />
</svg>
